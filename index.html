<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --noir: #100908;
    --oxblood: #2a0f15;
    --mahogany: #3a1711;
    --emerald: #10241d;
    --gold: #caa55c;
    --gold-soft: #e5c98f;
    --rose-gold: #c78963;
    --ivory: #f7efe3;
    --muted: rgba(247,239,227,0.68);
    --line: rgba(202,165,92,0.34);
  }

  html, body {
    height: 100%;
    background: var(--noir);
    color: var(--ivory);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    background:
      linear-gradient(145deg, rgba(16,9,8,0.95) 0%, rgba(42,15,21,0.9) 46%, rgba(16,36,29,0.86) 100%),
      repeating-linear-gradient(90deg, rgba(202,165,92,0.025) 0 1px, transparent 1px 92px);
    background-size: 140% 140%, auto;
    animation: royalAmbience 18s ease-in-out infinite alternate;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.035), transparent 24%),
      linear-gradient(90deg, rgba(202,165,92,0.08), transparent 18%, transparent 82%, rgba(202,165,92,0.08));
    z-index: 0;
  }

  /* ── Ornamental background ── */
  .bg-arch {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-arch svg {
    width: 100%;
    height: 100%;
    opacity: 0.075;
    animation: archDrift 16s ease-in-out infinite alternate;
  }

  /* ── Page layout ── */
  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 22px 46px;
  }

  /* ── Top rule ── */
  .top-rule {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold), rgba(202,165,92,0.28));
    margin-bottom: 26px;
    animation: fadeDown 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.1s;
  }

  /* ── Logo ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    animation: fadeDown 1s ease forwards, logoFloat 5.8s ease-in-out 1.4s infinite;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .logo-svg {
    width: min(306px, 84vw);
    height: auto;
    filter: drop-shadow(0 18px 34px rgba(0,0,0,0.34));
    overflow: visible;
  }

  .logo-wordmark {
    filter: drop-shadow(0 0 18px rgba(229,201,143,0.1));
  }

  .logo-sheen {
    opacity: 0;
    animation: logoSheen 4.8s ease-in-out 1.6s infinite;
  }

  /* ── Divider ── */
  .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 360px;
    margin: 20px 0 26px;
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
  }

  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--line), var(--gold));
  }
  .ornament-line.right {
    background: linear-gradient(to left, transparent, var(--line), var(--gold));
  }

  .ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(229,201,143,0.2);
  }

  /* ── Tagline ── */
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.14em;
    color: var(--gold-soft);
    text-align: center;
    margin-bottom: 42px;
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.7s;
  }

  /* ── Menu Cards ── */
  .menus {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 52px;
  }

  .menu-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    min-height: 118px;
    padding: 26px 28px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015)),
      rgba(16,9,8,0.52);
    box-shadow: 0 18px 42px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.4s ease, background 0.4s ease, transform 0.35s ease, box-shadow 0.35s ease;
    animation: cardArrive 0.95s cubic-bezier(.2,.8,.2,1) forwards;
    opacity: 0;
  }

  .menu-card:nth-child(1) { animation-delay: 0.9s; }
  .menu-card:nth-child(2) { animation-delay: 1.05s; }
  .menu-card:nth-child(3) { animation-delay: 1.2s; }

  .menu-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 18% 0%, rgba(229,201,143,0.12), transparent 32%),
      linear-gradient(120deg, rgba(202,165,92,0.18) 0%, transparent 48%, rgba(16,36,29,0.2) 100%);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .menu-card::after {
    content: '';
    position: absolute;
    inset: 7px;
    border: 1px solid rgba(229,201,143,0.12);
    border-radius: 6px;
    pointer-events: none;
  }

  .menu-card:hover {
    border-color: rgba(229,201,143,0.7);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.075), rgba(255,255,255,0.02)),
      rgba(42,15,21,0.62);
    box-shadow: 0 24px 52px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
    transform: translateY(-2px);
  }

  .menu-card:hover::before { opacity: 1; }

  .menu-card:active { transform: scale(0.985); }

  .card-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 1;
  }

  .card-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.32em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 27px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ivory);
    line-height: 1.1;
  }

  .card-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .card-icon {
    z-index: 1;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: 1px solid rgba(202,165,92,0.42);
    border-radius: 50%;
    background: rgba(16,9,8,0.34);
    transition: border-color 0.4s ease, transform 0.4s ease;
  }

  .menu-card:hover .card-icon {
    border-color: var(--gold-soft);
    transform: translateX(3px);
  }

  .card-icon svg {
    width: 18px;
    height: 18px;
    stroke: var(--gold-soft);
    fill: none;
    transition: transform 0.4s ease;
  }

  .menu-card:hover .card-icon svg {
    transform: translateX(2px);
  }

  /* corner accents */
  .card-corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: rgba(202,165,92,0.55);
    border-style: solid;
    transition: border-color 0.4s ease;
  }
  .card-corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .card-corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
  .menu-card:hover .card-corner { border-color: var(--gold-soft); }

  /* ── Social Links ── */
  .social-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
    animation-delay: 1.45s;
  }

  .social-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(229,201,143,0.58);
    text-transform: uppercase;
  }

  .social-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .social-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--muted);
    transition: color 0.3s ease;
  }

  .social-btn:hover { color: var(--gold-soft); }

  .social-icon-wrap {
    width: 46px;
    height: 46px;
    border: 1px solid rgba(202,165,92,0.28);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  .social-btn:hover .social-icon-wrap {
    border-color: var(--gold-soft);
    background: rgba(202,165,92,0.08);
  }

  .social-icon-wrap svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .social-name {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* ── Bottom rule ── */
  .bottom-rule {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: fadeIn 1.5s ease forwards;
    opacity: 0;
    animation-delay: 1.5s;
  }

  .bottom-rule-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
  }

  .bottom-copy {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(229,201,143,0.42);
    text-align: center;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Shimmer line on cards ── */
  .card-shimmer {
    position: absolute;
    top: 0; left: -120%;
    width: 48%;
    height: 100%;
    background: linear-gradient(105deg, transparent, rgba(229,201,143,0.12), transparent);
    animation: shimmer 5.4s ease infinite;
  }

  @keyframes shimmer {
    0%   { left: -120%; opacity: 0; }
    18%  { opacity: 1; }
    48%  { left: 150%; opacity: 0; }
    100% { left: 150%; opacity: 0; }
  }

  .menu-card:nth-child(2) .card-shimmer { animation-delay: 2s; }
  .menu-card:nth-child(3) .card-shimmer { animation-delay: 3s; }

  @keyframes royalAmbience {
    from { background-position: 0% 20%, 0 0; }
    to { background-position: 100% 80%, 0 0; }
  }

  @keyframes archDrift {
    from { transform: scale(1) translateY(0); opacity: 0.065; }
    to { transform: scale(1.035) translateY(-10px); opacity: 0.095; }
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  @keyframes logoSheen {
    0%, 58%, 100% { opacity: 0; transform: translateX(-120px); }
    68% { opacity: 0.24; }
    82% { opacity: 0; transform: translateX(120px); }
  }

  @keyframes cardArrive {
    from { opacity: 0; transform: translateY(24px) scale(0.985); filter: blur(3px); }
    to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  @media (max-width: 420px) {
    .page { padding-inline: 18px; }
    .menu-card {
      min-height: 112px;
      padding: 22px 20px;
      gap: 14px;
    }
    .card-title { font-size: 24px; }
    .card-subtitle { font-size: 13px; }
    .card-icon {
      width: 40px;
      height: 40px;
    }
  }
</style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZORAH — Royal Dining Menus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --noir: #100908;
    --oxblood: #2a0f15;
    --mahogany: #3a1711;
    --emerald: #10241d;
    --gold: #caa55c;
    --gold-soft: #e5c98f;
    --rose-gold: #c78963;
    --ivory: #f7efe3;
    --muted: rgba(247,239,227,0.68);
    --line: rgba(202,165,92,0.34);
  }

  html, body {
    height: 100%;
    background: var(--noir);
    color: var(--ivory);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    background:
      linear-gradient(145deg, rgba(16,9,8,0.95) 0%, rgba(42,15,21,0.9) 46%, rgba(16,36,29,0.86) 100%),
      repeating-linear-gradient(90deg, rgba(202,165,92,0.025) 0 1px, transparent 1px 92px);
    background-size: 140% 140%, auto;
    animation: royalAmbience 18s ease-in-out infinite alternate;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.035), transparent 24%),
      linear-gradient(90deg, rgba(202,165,92,0.08), transparent 18%, transparent 82%, rgba(202,165,92,0.08));
    z-index: 0;
  }

  /* ── Ornamental background ── */
  .bg-arch {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-arch svg {
    width: 100%;
    height: 100%;
    opacity: 0.075;
    animation: archDrift 16s ease-in-out infinite alternate;
  }

  /* ── Page layout ── */
  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 22px 46px;
  }

  /* ── Top rule ── */
  .top-rule {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--gold), rgba(202,165,92,0.28));
    margin-bottom: 26px;
    animation: fadeDown 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.1s;
  }

  /* ── Logo ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    animation: fadeDown 1s ease forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .logo-img {
    display: block;
    width: min(410px, 90vw);
    height: auto;
    filter: drop-shadow(0 16px 30px rgba(0,0,0,0.38)) drop-shadow(0 0 18px rgba(199,137,99,0.14));
  }

  /* ── Divider ── */
  .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 360px;
    margin: 20px 0 26px;
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.6s;
  }

  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--line), var(--gold));
  }
  .ornament-line.right {
    background: linear-gradient(to left, transparent, var(--line), var(--gold));
  }

  .ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(229,201,143,0.2);
  }

  /* ── Tagline ── */
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.14em;
    color: var(--gold-soft);
    text-align: center;
    margin-bottom: 42px;
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
    animation-delay: 0.7s;
  }

  /* ── Menu Cards ── */
  .menus {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 52px;
  }

  .menu-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    min-height: 118px;
    padding: 26px 28px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015)),
      rgba(16,9,8,0.52);
    box-shadow: 0 18px 42px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.4s ease, background 0.4s ease, transform 0.35s ease, box-shadow 0.35s ease;
    animation: cardArrive 0.95s cubic-bezier(.2,.8,.2,1) forwards;
    opacity: 0;
  }

  .menu-card:nth-child(1) { animation-delay: 0.9s; }
  .menu-card:nth-child(2) { animation-delay: 1.05s; }
  .menu-card:nth-child(3) { animation-delay: 1.2s; }

  .menu-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 18% 0%, rgba(229,201,143,0.12), transparent 32%),
      linear-gradient(120deg, rgba(202,165,92,0.18) 0%, transparent 48%, rgba(16,36,29,0.2) 100%);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .menu-card::after {
    content: '';
    position: absolute;
    inset: 7px;
    border: 1px solid rgba(229,201,143,0.12);
    border-radius: 6px;
    pointer-events: none;
  }

  .menu-card:hover {
    border-color: rgba(229,201,143,0.7);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.075), rgba(255,255,255,0.02)),
      rgba(42,15,21,0.62);
    box-shadow: 0 24px 52px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
    transform: translateY(-2px);
  }

  .menu-card:hover::before { opacity: 1; }

  .menu-card:active { transform: scale(0.985); }

  .card-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 1;
  }

  .card-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.32em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 27px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ivory);
    line-height: 1.1;
  }

  .card-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .card-icon {
    z-index: 1;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: 1px solid rgba(202,165,92,0.42);
    border-radius: 50%;
    background: rgba(16,9,8,0.34);
    transition: border-color 0.4s ease, transform 0.4s ease;
  }

  .menu-card:hover .card-icon {
    border-color: var(--gold-soft);
    transform: translateX(3px);
  }

  .card-icon svg {
    width: 18px;
    height: 18px;
    stroke: var(--gold-soft);
    fill: none;
    transition: transform 0.4s ease;
  }

  .menu-card:hover .card-icon svg {
    transform: translateX(2px);
  }

  /* corner accents */
  .card-corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: rgba(202,165,92,0.55);
    border-style: solid;
    transition: border-color 0.4s ease;
  }
  .card-corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .card-corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
  .menu-card:hover .card-corner { border-color: var(--gold-soft); }

  /* ── Social Links ── */
  .social-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
    animation-delay: 1.45s;
  }

  .social-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(229,201,143,0.58);
    text-transform: uppercase;
  }

  .social-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .social-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--muted);
    transition: color 0.3s ease;
  }

  .social-btn:hover { color: var(--gold-soft); }

  .social-icon-wrap {
    width: 46px;
    height: 46px;
    border: 1px solid rgba(202,165,92,0.28);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  .social-btn:hover .social-icon-wrap {
    border-color: var(--gold-soft);
    background: rgba(202,165,92,0.08);
  }

  .social-icon-wrap svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .social-name {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* ── Bottom rule ── */
  .bottom-rule {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: fadeIn 1.5s ease forwards;
    opacity: 0;
    animation-delay: 1.5s;
  }

  .bottom-rule-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
  }

  .bottom-copy {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(229,201,143,0.42);
    text-align: center;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Shimmer line on cards ── */
  .card-shimmer {
    position: absolute;
    top: 0; left: -120%;
    width: 48%;
    height: 100%;
    background: linear-gradient(105deg, transparent, rgba(229,201,143,0.12), transparent);
    animation: shimmer 5.4s ease infinite;
  }

  @keyframes shimmer {
    0%   { left: -120%; opacity: 0; }
    18%  { opacity: 1; }
    48%  { left: 150%; opacity: 0; }
    100% { left: 150%; opacity: 0; }
  }

  .menu-card:nth-child(2) .card-shimmer { animation-delay: 2s; }
  .menu-card:nth-child(3) .card-shimmer { animation-delay: 3s; }

  @keyframes royalAmbience {
    from { background-position: 0% 20%, 0 0; }
    to { background-position: 100% 80%, 0 0; }
  }

  @keyframes archDrift {
    from { transform: scale(1) translateY(0); opacity: 0.065; }
    to { transform: scale(1.035) translateY(-10px); opacity: 0.095; }
  }

  @keyframes cardArrive {
    from { opacity: 0; transform: translateY(24px) scale(0.985); filter: blur(3px); }
    to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  @media (max-width: 420px) {
    .page { padding-inline: 18px; }
    .menu-card {
      min-height: 112px;
      padding: 22px 20px;
      gap: 14px;
    }
    .card-title { font-size: 24px; }
    .card-subtitle { font-size: 13px; }
    .card-icon {
      width: 40px;
      height: 40px;
    }
  }
</style>
</head>
